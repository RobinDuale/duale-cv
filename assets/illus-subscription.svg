<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#f7f4ee"/>

  <!-- Subtle background ellipses -->
  <ellipse cx="200" cy="280" rx="180" ry="120" fill="#d8c890" opacity="0.14"/>
  <ellipse cx="620" cy="180" rx="200" ry="140" fill="#c8b870" opacity="0.12"/>

  <!-- Grid lines -->
  <line x1="50" y1="340" x2="750" y2="340" stroke="#9a7228" stroke-width="0.5" opacity="0.12"/>
  <line x1="50" y1="275" x2="750" y2="275" stroke="#9a7228" stroke-width="0.5" opacity="0.08"/>
  <line x1="50" y1="210" x2="750" y2="210" stroke="#9a7228" stroke-width="0.5" opacity="0.08"/>
  <line x1="50" y1="145" x2="750" y2="145" stroke="#9a7228" stroke-width="0.5" opacity="0.08"/>

  <!-- Left zone: irregular variable revenue bars -->
  <rect x="62"  y="220" width="28" height="120" rx="1" fill="#9a7228" opacity="0.30"/>
  <rect x="104" y="278" width="28" height="62"  rx="1" fill="#9a7228" opacity="0.22"/>
  <rect x="146" y="148" width="28" height="192" rx="1" fill="#9a7228" opacity="0.35"/>
  <rect x="188" y="244" width="28" height="96"  rx="1" fill="#9a7228" opacity="0.25"/>
  <rect x="230" y="192" width="28" height="148" rx="1" fill="#9a7228" opacity="0.30"/>
  <rect x="272" y="295" width="28" height="45"  rx="1" fill="#9a7228" opacity="0.20"/>

  <!-- Zone label left -->
  <text x="178" y="378" font-family="Jost,sans-serif" font-size="10" letter-spacing="2" fill="#9a7228" opacity="0.40" text-anchor="middle">MODÈLE VARIABLE</text>

  <!-- Central divider -->
  <line x1="345" y1="52" x2="345" y2="365" stroke="#9a7228" stroke-width="1" stroke-dasharray="5,5" opacity="0.18"/>

  <!-- Transition arrow -->
  <line x1="362" y1="210" x2="398" y2="210" stroke="#9a7228" stroke-width="1.8" opacity="0.45"/>
  <polygon points="393,203 403,210 393,217" fill="#9a7228" opacity="0.45"/>

  <!-- Right zone: smooth ARR area fill -->
  <path d="M425 340 C468 334 508 308 552 272 C596 236 646 188 728 112 L728 340 Z" fill="#9a7228" opacity="0.07"/>

  <!-- ARR growth curve -->
  <path d="M425 340 C468 334 508 308 552 272 C596 236 646 188 728 112" fill="none" stroke="#9a7228" stroke-width="2.4" stroke-linecap="round" opacity="0.72"/>

  <!-- Data points on curve -->
  <circle cx="425" cy="340" r="4"   fill="#9a7228" opacity="0.55"/>
  <circle cx="490" cy="316" r="4"   fill="#9a7228" opacity="0.62"/>
  <circle cx="552" cy="272" r="4"   fill="#9a7228" opacity="0.70"/>
  <circle cx="638" cy="193" r="4"   fill="#9a7228" opacity="0.78"/>
  <circle cx="728" cy="112" r="5"   fill="#9a7228" opacity="0.88"/>
  <circle cx="728" cy="112" r="11"  fill="none"    stroke="#9a7228" stroke-width="0.8" opacity="0.28"/>

  <!-- Zone label right -->
  <text x="578" y="378" font-family="Jost,sans-serif" font-size="10" letter-spacing="2" fill="#9a7228" opacity="0.55" text-anchor="middle">100% ABONNEMENT · ARR</text>
</svg>
